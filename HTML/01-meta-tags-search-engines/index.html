<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- This meta tag specifies the character encoding for the HTML document, ensuring that the text is displayed correctly. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- This meta tag sets the viewport to control the page's dimensions and scaling on different devices, making it responsive. -->

    <meta name="description" content="A sandbox for experimenting with HTML and CSS, focusing on meta tags for search engines."> <!-- This meta tag provides a brief description of the webpage's content, which can be used by search engines to display in search results. -->

    <meta name="author" content="Anika"> <!-- This meta tag specifies the author of the webpage, which can be useful for search engines and users to identify the creator of the content. -->

    <meta name="robots" content="index, follow"> <!-- This meta tag instructs search engine crawlers to index the page and follow the links on it, which can help improve the page's visibility in search results. -->
    <title>HTML and CSS Sandbox</title>
</head>
<body>
    <h1>HTML and CSS Sandbox - Meta Tags</h1>
</body>
</html>
