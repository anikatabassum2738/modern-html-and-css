<!-- 
 Inline Elements: occupy only sufficient width required, don't start in a new line, allow other inline elements to sit behind, don't have top and bottom margins
    span, a, strong, button, em, img, ins, del, br, i, b, u, small, sub, sup, mark, abbr, cite, code, q 
 
 Block Elements: occupy the entire width available, start in a new line, allow other block elements to sit behind, have top and bottom margins
    div, p, h1-h6, ul, ol, li, table, form, header, footer, section, article, nav, aside, main, figure, figcaption, address, blockquote, pre
 -->

 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox</title>
    <style>
        p {
            background-color: lightblue;
            padding: 1rem;
            margin-bottom: 2rem;
        }

        a {
            background-color: lightgreen;
            padding: 0.5rem;
            margin-right: 5rem;
            margin-bottom: 4rem;
            text-decoration: none;
        }
    </style>
 </head>
 <body>
    <h1>HTML & CSS Sandbox - Block and Inline Elements</h1>

    <!-- Block-Level Elements -->
     <p>Lorem ipsum dolor sit.</p>
     <p>Lorem ipsum dolor sit.</p>

    <!-- Inline Elements -->
    <a href="#">Link 1</a>
    <a href="#">Link 2</a>
    <p>Lorem ipsum dolor sit.</p>
 </body>
 </html>
