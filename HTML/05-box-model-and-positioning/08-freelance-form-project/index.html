<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="card">
            <h1>Need to hire a freelancer?</h1>
            <p>Sign up, type in what you need and recieve free quotes in seconds.</p>
            <form>
                <div class="form-group">
                    <input type="text" name="text" placeholder="What do you need done?">
                    <div class="form-group">
                        <button type="submit">Post a Project</button>
                    </div>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
