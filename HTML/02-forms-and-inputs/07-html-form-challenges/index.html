<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartment Search</title>
</head>
<body>
    <header>
        <h1>Apartment Search</h1>
    </header>

    <main>
        <form>
            <div>
                <label for="location">Location:</label>
                <input type="text" name="location" id="location">
            </div>
            <br>
            <div>
                <label for="price">Monthly Price:</label>
                <input type="range" name="price" id="price" min="0" max="5000" step="100">
            </div>
        <br>
        <div>
            <label for="bedrooms">Bedrooms:</label>
            <input type="number" name="bedrooms" id="bedrooms" min="1" max="10">
        </div>
        <br>
        <div>
            <label for="pet">Pet Friendly:</label>
            <input type="checkbox" name="pet" id="pet">
        </div>
        <br>
        <div>
            <label for="date">Available Date:</label>
            <input type="date" name="date" id="date">
        </div>
        <br>
        <button type="submit">Search</button>
    </form>
</main>
</body>
</html>
