<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox</title>
</head>
<body>
    <h1>HTML & CSS Sandbox - Images</h1>
    <!-- Relative path - width, height, title-->
    <img src="images/sample.png" alt="coder girl" width="200" height="200" title="Coder Girl"/>
    
    <!-- Absolute path -->
    <img src="https://picsum.photos/200/300" alt="Random Image" title="Random Image"/>

    <!-- figure and figcaption -->
    <figure>
        <img src="images/sample.png" alt="coder girl" width="200" height="200" title="Coder Girl"/>
        <figcaption>Fig.1 - Coder Girl</figcaption>
    </figure>
</body>
</html>
