<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox</title>
</head>
<body>
    <h1>HTML & CSS Sandbox - iframe</h1>

    <!-- good for embedding external content -->

    <!-- Web page -->
    <iframe src="https://www.daraz.com" frameborder="0"></iframe>

    <!-- videos -->
    <iframe 
    width="560" 
    height="315" 
    src="https://www.youtube.com/embed/epWB4hm2JRI" 
    frameborder="0" 
    allowfullscreen></iframe>

    <!-- pdf -->
    <iframe src="./document.pdf" width="100%" height="500px"></iframe>

    <!-- google maps -->
    <iframe 
    width="560" 
    height="315" 
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14605.82320749479!2d85.3240476!3d27.7007689!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjcuNzAwNzY4IDg1LjMyNDA0NzY!5e0!3m2!1sen!2snp" 
    frameborder="0" 
    allowfullscreen></iframe>

    <!-- google calendar -->
    <iframe 
    width="560" 
    height="315" 
    src="https://calendar.google.com/calendar/embed?src=example.com_1234567890abcdef1234567890abcdef@group.calendar.google.com" 
    frameborder="0" 
    allowfullscreen></iframe>

    <!-- embed -->
    <iframe 
    width="560"
    height="315"
    src="https://www.youtube.com/embed/epWB4hm2JRI"
    frameborder="0"
    allowfullscreen></iframe>

    <!-- object -->
     <object 
    width="560"
    height="315"
    data="https://www.youtube.com/embed/epWB4hm2JRI"
    frameborder="0"
    allowfullscreen></object>
</body>
</html>
