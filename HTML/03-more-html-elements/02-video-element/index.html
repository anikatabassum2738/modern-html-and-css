<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox</title>
</head>
<body>
    <h1>HTML & CSS Sandbox - Video</h1>

    <video src="video1.mov" type="video/quicktime" controls ></video>
    <video src="video2.mp4" type="video/mp4" controls width="500rem" height="300rem"></video>

    <!-- autoplay -->
    <video src="video1.mov" type="video/quicktime" controls autoplay></video>

    <!-- loop -->
    <video src="video1.mov" type="video/mov" controls loop></video>

    <!-- mute -->
    <video src="video1.mov" type="video/quicktime" controls muted></video>

    <!-- figure and figcaption -->
    <figure>
        <video src="video1.mov" type="video/quicktime" controls></video>
        <figcaption>Video Caption</figcaption>
        <a href="./video1.mov">Download Video</a>
    </figure>
</body>
</html>
