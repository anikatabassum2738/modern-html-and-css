<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox</title>
</head>
<body>
    <h1>HTML & CSS Sandbox - Global Attributes</h1>

    <!-- class -->
     <h2 class="text-xl">Heading 1</h2>

    <!-- id -->
    <h2 id="main-heading">Heading 2</h2>

    <!-- style -->
    <h2 style="color: red; font-size: 17px;">Heading 3</h2>

    <!-- accesskey and title -->
    <button accesskey="h" title="Go to Home" onclick="alert('Bye Bye')">Home</button>

    <!-- hidden -->
     <div hidden>This is hidden content.</div>

     <!-- tabindex -->
     <button tabindex="3">Button 1</button>
     <button tabindex="1">Button 2</button>
     <button tabindex="2">Button 3</button>

     <!-- contenteditable -->
     <div contenteditable="true">This content is editable.</div>

     <!-- draggable -->
     <div draggable="true">This content is draggable.</div>

     <!-- autofocus -->
     <input type="text" autofocus>
</body>
</html>
