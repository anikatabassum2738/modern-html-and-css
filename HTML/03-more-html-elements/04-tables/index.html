<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox</title>
</head>
<body>
    <h1>HTML & CSS Sandbox - Tables</h1>
    <table>
        <colgroup>
            <col style="width: 25%; background-color: lightblue;">
            <col style="width: 25%; background-color: lightgray;">
            <col style="width: 25%; background-color: lightblue;">
            <col style="width: 25%; background-color: lightgray;">
        </colgroup>
        <thead>
            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Age</th>
                <th colspan="2">Telephone Numbers</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John</td>
                <td>Doe</td>
                <td>30</td>
                <td>9827212</td>
                <td>9663576</td>
            </tr>
            <tr>
                <td>John</td>
                <td>Doe</td>
                <td>30</td>
                <td>9827212</td>
                <td>9663576</td>
            </tr>
        </tbody>
        
    </table>
</body>
</html>
