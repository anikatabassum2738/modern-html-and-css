<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Sandbox</title>
    <link rel="stylesheet" href="styles.css">

                <li><a href="/about">About</a></li>

        </div>

    <h1>Welcome</h1>
